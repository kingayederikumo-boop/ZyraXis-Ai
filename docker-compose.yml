services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  worker:
    build: .
    command: python -m app.workers.start_consumer
    env_file:
      - .env
    restart: unless-stopped
