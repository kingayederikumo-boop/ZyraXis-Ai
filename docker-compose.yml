version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: zyrax-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    container_name: zyrax-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: always

  worker:
    build: .
    container_name: zyrax-worker
    command: python -m app.workers.start_consumer
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WORKER_MODE=v2
    depends_on:
      - redis
    restart: always
