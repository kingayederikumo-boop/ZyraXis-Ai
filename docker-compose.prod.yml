version: "3.9"

services:
  zyraxis:
    build: .
    container_name: zyraxis-ai
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - RUN_MODE=webhook
      - WEBHOOK_URL=${WEBHOOK_URL}
      - PORT=8000
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: zyraxis-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - zyraxis